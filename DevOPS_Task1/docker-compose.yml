version: "3"

services:

  backend1:
    image: risvanthkm/devops-task-backend:latest
    environment:
      HTTP_ADDR: ":9090"
      DATABASE_URL: postgres://postgres:postgres@db:5432/cr45_reduced?sslmode=disable
      APP_SECRET: cr45-reduced-dev-secret
    ports:
      - "9091:9090"
    depends_on:
      db:
        condition: service_healthy

    backend2:
      image: risvanthkm/devops-task-backend:latest
      environment:
        HTTP_ADDR: ":9090"
        DATABASE_URL: postgres://postgres:postgres@db:5432/cr45_reduced?sslmode=disable
        APP_SECRET: cr45-reduced-dev-secret
      ports:
        - "9092:9090"
      depends_on:
        db:
          condition: service_healthy
        
    backend3:
      image: risvanthkm/devops-task-backend:latest
      environment:
        HTTP_ADDR: ":9090"
        DATABASE_URL: postgres://postgres:postgres@db:5432/cr45_reduced?sslmode=disable
        APP_SECRET: cr45-reduced-dev-secret
      ports:
        - "9093:9090"
      depends_on:
        db:
          condition: service_healthy

  frontend:
    image: risvanthkm/devops-task-frontend:latest
    environment:
      VITE_CLASS_ID: "107125"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: cr45_reduced
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
